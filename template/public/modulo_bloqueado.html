{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Módulo en mantenimiento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="min-height:100vh">
  <div class="text-center px-3" style="max-width:480px">
    <i class="bi bi-tools display-1 text-warning mb-3 d-block"></i>
    <h1 class="h3 fw-bold mb-2">Módulo en mantenimiento</h1>
    <p class="text-white-50 mb-1">
      El módulo <strong class="text-white">{{ modulo.nombre }}</strong> está temporalmente fuera de servicio.
    </p>
    {% if modulo.motivo %}
    <p class="text-warning small mb-4"><i class="bi bi-info-circle me-1"></i>{{ modulo.motivo }}</p>
    {% else %}
    <p class="mb-4"></p>
    {% endif %}
    <a href="/" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-house me-1"></i>Volver al inicio</a>
  </div>
</body>
</html>
