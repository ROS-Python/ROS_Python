{% extends 'layout/base.html' %}
{% block title %}Editar Pedido #{{ pedido.id }}{% endblock %}
{% block page_title %}Editar Pedido{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Pedido <span class="text-warning">#{{ pedido.id }}</span></h1>
    <a href="{% url 'admin_pedidos' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver a pedidos</a>
  </div>
</div>

<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3" novalidate>
        {% csrf_token %}

        <div class="col-md-6">
          <label class="form-label" for="cliente_nombre">Nombre del cliente</label>
          <input type="text" class="form-control" id="cliente_nombre" name="cliente_nombre"
            value="{{ pedido.cliente_nombre|default:'' }}" maxlength="100">
        </div>

        <div class="col-md-6">
          <label class="form-label" for="numero_mesa">Número de mesa</label>
          <input type="text" class="form-control" id="numero_mesa" name="numero_mesa"
            value="{{ pedido.numero_mesa|default:'' }}" maxlength="10">
        </div>

        <div class="col-md-6">
          <label class="form-label" for="total">Total</label>
          <div class="input-group">
            <span class="input-group-text">$</span>
            <input type="number" step="0.01" min="0" class="form-control" id="total" name="total"
              value="{{ pedido.total }}" required>
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label" for="estado">Estado</label>
          <select class="form-select" id="estado" name="estado">
            {% for val, label in estados %}
            <option value="{{ val }}" {% if pedido.estado == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-12">
          <label class="form-label" for="comentarios">Comentarios</label>
          <textarea class="form-control" id="comentarios" name="comentarios" rows="3" maxlength="500">{{ pedido.comentarios|default:'' }}</textarea>
        </div>

        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Guardar cambios</button>
          <a href="{% url 'admin_pedidos' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
