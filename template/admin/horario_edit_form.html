{% extends 'layout/base.html' %}
{% block title %}Editar Horario{% endblock %}
{% block page_title %}Editar Horario{% endblock %}
{% block content %}
<div class="page-header">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-2">
    <h1 class="panel-page-title mb-0"><i class="bi bi-pencil-square me-2"></i>Editar Horario <span class="text-warning">#{{ horario.id }}</span></h1>
    <a href="{% url 'admin_horarios' %}" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Volver a horarios</a>
  </div>
</div>

<div class="content-section">
  <div class="card">
    <div class="card-body">
      <form method="post" class="row g-3" novalidate>
        {% csrf_token %}

        <div class="col-md-6">
          <label class="form-label">Empleado</label>
          <select class="form-select" name="user_id">
            {% for e in empleados %}
            <option value="{{ e.pk }}" {% if horario.user_id == e.pk %}selected{% endif %}>
              {{ e.nombre }} {{ e.apellido }}
            </option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Día de la semana</label>
          <select class="form-select" name="dia_semana">
            {% for val, label in dias %}
            <option value="{{ val }}" {% if horario.dia_semana == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Hora de entrada</label>
          <input type="time" class="form-control" name="hora_inicio" value="{{ horario.hora_inicio }}" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Hora de salida</label>
          <input type="time" class="form-control" name="hora_fin" value="{{ horario.hora_fin }}" required>
        </div>

        <div class="col-12 mt-3">
          <button type="submit" class="btn btn-warning text-dark fw-semibold"><i class="bi bi-check2 me-1"></i>Guardar cambios</button>
          <a href="{% url 'admin_horarios' %}" class="btn btn-outline-light ms-2">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
